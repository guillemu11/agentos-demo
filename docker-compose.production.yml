version: '3.8'

services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: agentos
      PG_USER: agentos
      PG_PASSWORD: ${PG_PASSWORD:-changeme}
      SESSION_SECRET: ${SESSION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WORKSPACE_NAME: ${WORKSPACE_NAME:-My Team}
      DASHBOARD_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentos
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/core/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
