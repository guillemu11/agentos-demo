<!-- BLOCK: emirates-icon-text-card-v1 -->
<!-- TYPE: info-card | BRAND: emirates | PURPOSE: Single card with a 55x55px icon on the left (12% width) and bold title + description text on the right (88% width). Card has border, shadow and rounded corners. Used to highlight informational notices, updates, or secondary offers. Supports: {{ICON_URL}}, {{ICON_SRC}}, {{TITLE}}, {{DESCRIPTION}}, {{LINK_URL}}, {{LINK_TEXT}} placeholders. -->
<table align="center" aria-hidden="true" border="0" cellpadding="0" cellspacing="0" role="presentation" style="max-width: 842px;" width="100%">
  <tbody>
    <tr>
      <td>
        <table align="center" aria-hidden="true" border="0" cellpadding="0" cellspacing="0" role="presentation" style="max-width: 642px; margin: 0 auto;" width="100%">
          <tbody>
            <tr>
              <td style="padding: 0 10px 25px;">
                <table class="single-card" style="border: 1px solid #e1e1e1; background-color: #ffffff; box-shadow: 0 2px 4px 2px rgba(0,0,0,0.10); -moz-box-shadow: 0 2px 4px 2px rgba(0,0,0,0.10); -webkit-box-shadow: 0 2px 4px 2px rgba(0,0,0,0.10); border-radius: 3px; -moz-border-radius: 3px; -webkit-border-radius: 3px; overflow: hidden; width: 100%; border-collapse: initial !important;" width="642">
                  <tbody>
                    <tr>
                      <td style="padding: 0 20px 3px; font-family: HelveticaNeue-Light, Helvetica Neue Light, Helvetica, Arial, sans-serif; font-weight: 300; font-size: 14px; color: #333333; text-align: center;">
                        <table align="left" border="0" cellpadding="0" cellspacing="0" width="100%">
                          <tbody>
                            <tr>
                              <td style="padding: 15px 0 12px; font-family: HelveticaNeue-Light, Helvetica Neue Light, Helvetica, Arial, sans-serif; font-weight: 300; font-size: 14px; color: #333333; text-align: center;">
                                <table align="left" border="0" cellpadding="0" cellspacing="0" width="100%">
                                  <tbody>
                                    <tr>
                                      <td>
                                        <!-- Icon column (12%) -->
                                        <div class="stack-column left-column" style="display: inline-block; width: 12%; vertical-align: top;">
                                          <table aria-hidden="true" border="0" cellpadding="0" cellspacing="0" role="presentation" width="100%">
                                            <tbody>
                                              <tr>
                                                <td align="left" class="desktop-text-left" height="55" style="text-align: center; vertical-align: top;" width="55">
                                                  <a href="{{ICON_URL}}" style="color: #333333; text-decoration: none;" target="_blank">
                                                    <img height="55" src="{{ICON_SRC}}" style="width: 55px; height: 55px; max-width: 55px; vertical-align: top;" />
                                                  </a>
                                                </td>
                                              </tr>
                                            </tbody>
                                          </table>
                                        </div>
                                        <!-- Text column (88%) -->
                                        <div class="stack-column right-column" style="display: inline-block; width: 88%; vertical-align: top;">
                                          <table aria-hidden="true" border="0" cellpadding="0" cellspacing="0" role="presentation" width="100%">
                                            <tbody>
                                              <tr>
                                                <td align="left" class="desktop-text-left mobile-top-10" style="margin: 0 auto !important; font-family: HelveticaNeue-Light, Helvetica Neue Light, Helvetica, Arial, sans-serif; font-weight: 300; font-size: 14px; color: #333333; line-height: 18px; letter-spacing: 0px; text-align: center; padding-left: 20px;" valign="top">
                                                  <b>{{TITLE}}</b>
                                                  <br />
                                                  {{DESCRIPTION}}
                                                  <b><a href="{{LINK_URL}}" style="color: #333333; text-decoration: none;" target="_blank" title="{{LINK_TEXT}}">{{LINK_TEXT}}</a></b>
                                                </td>
                                              </tr>
                                            </tbody>
                                          </table>
                                        </div>
                                      </td>
                                    </tr>
                                  </tbody>
                                </table>
                              </td>
                            </tr>
                          </tbody>
                        </table>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>
  </tbody>
</table>
